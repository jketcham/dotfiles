# Catppuccin Frappe-inspired palette
palette = "catppuccin_frappe"

format = """
$time$directory$git_branch$git_status$nodejs$python$terraform$gcloud$cmd_duration
$character"""

[time]
disabled = false
format = '[$time]($style) '
time_format = "%H:%M"
style = "dimmed white"

[directory]
truncation_length = 3
style = "bold blue"

[git_branch]
format = '[$symbol$branch]($style) '
style = "bold mauve"

[git_status]
style = "bold red"

[nodejs]
format = '[$symbol($version)]($style) '
symbol = " "

[python]
format = '[$symbol($version)]($style) '

[terraform]
format = '[$symbol$workspace]($style) '

[gcloud]
format = '[$symbol$active]($style) '
symbol = "gcp:"
style = "bold sky"

[cmd_duration]
min_time = 2000
format = '[$duration]($style) '
style = "yellow"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[palettes.catppuccin_frappe]
rosewater = "#f2d5cf"
flamingo = "#eebebe"
pink = "#f4b8e4"
mauve = "#ca9ee6"
red = "#e78284"
maroon = "#ea999c"
peach = "#ef9f76"
yellow = "#e5c890"
green = "#a6d189"
teal = "#81c8be"
sky = "#99d1db"
sapphire = "#85c1dc"
blue = "#8caaee"
lavender = "#babbf1"
text = "#c6d0f5"
subtext1 = "#b5bfe2"
subtext0 = "#a5adce"
overlay2 = "#949cbb"
overlay1 = "#838ba7"
overlay0 = "#737994"
surface2 = "#626880"
surface1 = "#51576d"
surface0 = "#414559"
base = "#303446"
mantle = "#292c3c"
crust = "#232634"
